services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "${APP_PORT:-80}:8000"
    environment:
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: smauii_core
      DB_USERNAME: sail
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_MAILER: smtp
    volumes:
      - .:/var/www/html
    depends_on:
      pgsql:
        condition: service_healthy
    networks:
      - smauii

  pgsql:
    image: postgres:16-alpine
    ports:
      - "${PGSQL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: smauii_core
      POSTGRES_USER: sail
      POSTGRES_PASSWORD: password
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sail -d smauii_core"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smauii

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smauii

  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - smauii

volumes:
  pgsql_data:
  redis_data:

networks:
  smauii:
    driver: bridge
